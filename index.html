<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>buneeas</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Contact box (hidden by default) -->
  <div id="contact-box" class="about-box">
    <div class="about-content">
      <h2>Contact Me</h2>
      <p>Email: buneeas@gmail.com</p>
      <p>Discord: @buneeas</p>
      <button id="close-contact">Close</button>
    </div>
  </div>

  <!-- Taskbar -->
  <div class="taskbar">
      <div>Home</div>
      <div id="about-btn" onclick="window.location.href='about.html'">About</div>
      <div id="contact-btn">Contact</div>
      <div id="gallery-btn">Gallery</div>
  </div>

  <!-- Side borders -->
  <div class="side-border left"></div>
  <div class="side-border right"></div>

  <!-- Header with bunny and wings -->
  <div class="header-container">
      <img class="wing left-wing" src="https://img1.picmix.com/output/stamp/thumb/3/7/7/9/2629773_9a5e1.gif">
      <img class="bunny" src="https://media.tenor.com/ikzslJI3dh8AAAAj/pixel-bunny.gif">
      <img class="wing right-wing" src="https://img1.picmix.com/output/stamp/thumb/3/7/7/9/2629773_9a5e1.gif">
  </div>

  <!-- Main text content -->
  <div class="text-box">
      <h1>buneeas✧˖°</h1>
      <p>Testing testing small website!!</p>
      <p>Above is my art hehe!!</p>
      <p>Below is a random image of a cat from the internet~</p>
      <p>My business email: buneeas@gmail.com</p>
      <img id="cat-img" src="" alt="Random Cat" style="max-width:300px;margin-top:10px;">
  </div>

  <!-- Carousel -->
  <div class="carousel">
      <div class="image-container">
          <img src="https://pbs.twimg.com/media/HC6w747bMAAmRHh?format=jpg&name=4096x4096" alt="Art" />
          <img src="https://pbs.twimg.com/media/GxMhNjiWIAAINvA?format=jpg&name=large" alt="Art 2" />
          <img src="https://pbs.twimg.com/media/GtTaeEZWYAAzDnX?format=jpg&name=large" alt="Art 3" />
          <img src="https://pbs.twimg.com/media/GtTcVI1WwAA37GU?format=jpg&name=large" alt="Art 4" />
          <img src="https://pbs.twimg.com/media/GxZM_N-WcAAmH4T?format=jpg&name=large" alt="Art 5" />
          <!-- duplicate for seamless scroll -->
          <img src="https://pbs.twimg.com/media/HC6w747bMAAmRHh?format=jpg&name=4096x4096" alt="Art" />
          <img src="https://pbs.twimg.com/media/GxMhNjiWIAAINvA?format=jpg&name=large" alt="Art 2" />
          <img src="https://pbs.twimg.com/media/GtTaeEZWYAAzDnX?format=jpg&name=large" alt="Art 3" />
          <img src="https://pbs.twimg.com/media/GtTcVI1WwAA37GU?format=jpg&name=large" alt="Art 4" />
          <img src="https://pbs.twimg.com/media/GxZM_N-WcAAmH4T?format=jpg&name=large" alt="Art 5" />
      </div>
  </div>

  <!-- Links / Socials -->
  <div class="social-links">
      <a href="https://vgen.co/buneeas">
          <img class="logo" src="https://help.vgen.co/hc/article_attachments/13004231445911" alt="VGen commission" />
      </a>
      <a href="https://x.com/buneeas">
          <img class="logo twitter-logo" src="https://pngimg.com/d/twitter_PNG34.png" alt="Twitter/X profile" />
      </a>
      <a href="https://www.instagram.com/buneeas/">
          <img class="logo instagram-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/960px-Instagram_logo_2016.svg.png" alt="Instagram profile" />
      </a>
  </div>

  <!-- Bottom fade -->
  <div class="bottom-fade"></div>

  <!-- Confetti button -->
  <button id="confetti-btn" class="confetti-btn">🎉</button>

  <script type="module" src="index.js"></script>
  <script>
    // Cat API
    const catImgElem = document.getElementById("cat-img");
    fetch("https://api.thecatapi.com/v1/images/search")
      .then(res => res.json())
      .then(data => { catImgElem.src = data[0].url; })
      .catch(e => { console.error(e); });

    // Contact box
    const contactBox = document.getElementById("contact-box");
    const contactBtn = document.getElementById("contact-btn");
    const closeContactBtn = document.getElementById("close-contact");
    contactBtn.addEventListener("click", () => { contactBox.style.display = "flex"; });
    closeContactBtn.addEventListener("click", () => { contactBox.style.display = "none"; });

    // Confetti button
    const confettiBtn = document.getElementById("confetti-btn");
    confettiBtn.addEventListener("click", () => {
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        document.body.appendChild(confetti);
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
        confetti.style.width = Math.random() * 10 + 5 + "px";
        confetti.style.height = Math.random() * 10 + 5 + "px";
        const duration = Math.random() * 3000 + 2000;
        confetti.animate([{ transform: 'translateY(0) rotate(0deg)' }, { transform: `translateY(${window.innerHeight + 100}px) rotate(${Math.random()*720}deg)` }], { duration, easing: 'linear' });
        setTimeout(() => confetti.remove(), duration);
      }
    });

    // Gallery button
    const galleryBtn = document.getElementById("gallery-btn");
    galleryBtn.addEventListener("click", () => { window.location.href = "gallery.html"; });
  </script>
</body>
</html>
